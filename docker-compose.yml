version: '3.8'

services:
  # Frontend - Pirangueiro Financeiro Digital
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: pirangueiro-frontend
    ports:
      - "3000:80"
    environment:
      - NODE_ENV=production
    networks:
      - default
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"  # Permite acesso ao backend no host
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend.rule=Host(`localhost`)"
      - "traefik.http.services.frontend.loadbalancer.server.port=80"

  # Frontend em modo desenvolvimento (opcional)
  frontend-dev:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    container_name: pirangueiro-frontend-dev
    ports:
      - "8082:8082"
    environment:
      - NODE_ENV=development
    volumes:
      - .:/app
      - /app/node_modules
    networks:
      - default
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"  # Permite acesso ao backend no host
    profiles:
      - dev

# Comentário: O backend está rodando externamente no localhost:8080
# O frontend irá acessar o backend através do host.docker.internal
# ou diretamente via localhost:8080 dependendo da configuração da aplicação

# Se você quiser usar um backend externo já rodando:
# networks:
#   default:
#     external:
#       name: nome_da_rede_do_backend 