version: '3.8'

services:
  # Frontend - Pirangueiro Financeiro Digital
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: pirangueiro-frontend
    ports:
      - "3000:80"
    environment:
      - NODE_ENV=production
    depends_on:
      - backend
    networks:
      - pirangueiro-network
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend.rule=Host(`localhost`)"
      - "traefik.http.services.frontend.loadbalancer.server.port=80"

  # Frontend em modo desenvolvimento (opcional)
  frontend-dev:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    container_name: pirangueiro-frontend-dev
    ports:
      - "8082:8082"
    environment:
      - NODE_ENV=development
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - pirangueiro-network
    restart: unless-stopped
    profiles:
      - dev

  # Backend (assumindo que você já tem um docker-compose para ele)
  # Se o backend está em outro docker-compose, você pode usar external_links
  # ou criar uma rede externa
  backend:
    # Se você já tem um backend rodando, você pode comentar esta seção
    # e usar external_links ou configurar uma rede externa
    image: seu-backend-image:latest  # Substitua pelo nome da sua imagem do backend
    container_name: pirangueiro-backend
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - CORS_ALLOWED_ORIGINS=http://localhost:3000,http://localhost:8082
    networks:
      - pirangueiro-network
    restart: unless-stopped
    # Adicione suas configurações específicas do backend aqui

networks:
  pirangueiro-network:
    driver: bridge
    name: pirangueiro-network

# Se você quiser usar um backend externo já rodando:
# networks:
#   default:
#     external:
#       name: nome_da_rede_do_backend 