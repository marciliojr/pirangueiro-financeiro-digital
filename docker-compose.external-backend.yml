version: '3.8'

services:
  # Frontend - Pirangueiro Financeiro Digital
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: pirangueiro-frontend
    ports:
      - "3000:80"
    environment:
      - NODE_ENV=production
    networks:
      - default
    restart: unless-stopped
    extra_hosts:
      - "backend:host-gateway"  # Permite acesso ao backend no host

  # Frontend em modo desenvolvimento (opcional)
  frontend-dev:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    container_name: pirangueiro-frontend-dev
    ports:
      - "8082:8082"
    environment:
      - NODE_ENV=development
    volumes:
      - .:/app
      - /app/node_modules
    networks:
      - default
    restart: unless-stopped
    extra_hosts:
      - "backend:host-gateway"  # Permite acesso ao backend no host
    profiles:
      - dev

# Se você tem uma rede específica do backend, descomente e ajuste:
# networks:
#   default:
#     external:
#       name: sua_rede_do_backend 